<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="front">
      <rect x="-100" y="100" width="500" height="300" transform="rotate(33, 100, 100)"/>
    </clipPath>
  </defs>
  <!-- Back arc of orbital ring (behind circle) -->
  <ellipse cx="100" cy="100" rx="112" ry="30"
           transform="rotate(-33, 100, 100)"
           stroke="currentColor" stroke-width="8.5" stroke-linecap="round"/>
  <!-- Globe circle (covers back of orbital ring) -->
  <circle cx="100" cy="100" r="66" stroke="currentColor" stroke-width="8.5"/>
  <!-- Front arc of orbital ring (in front of circle) -->
  <ellipse cx="100" cy="100" rx="112" ry="30"
           transform="rotate(-33, 100, 100)"
           stroke="currentColor" stroke-width="8.5" stroke-linecap="round"
           clip-path="url(#front)"/>
</svg>
